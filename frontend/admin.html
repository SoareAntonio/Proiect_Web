<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Admin Zoo</title>
    
    <link rel="stylesheet" href="./style/zoo/base.css">
    <link rel="stylesheet" href="./style/zoo/navbar.css">
    <link rel="stylesheet" href="./style/user/login.css">
    <link rel="stylesheet" href="./style/admin/dashboard.css">
    <link rel="stylesheet" href="./style/admin/form.css">
</head>
<body>

    <nav>
      <a class="logo" href="index.html">
          <img src="./assets/images/logo.png" alt="AnimaliaDB Logo">
      </a>

      <div class="nav-actions">
        <div class="lang-switcher">
          <a href="#" class="active">RO</a>
          <span class="separator">|</span>
          <a href="#">EN</a>
        </div>
        <div class="vertical-divider"></div>
          <a class="user-profile" href="profile.html">
              <div class="avatar">AD</div>
              <span class="user-name">Profil</span>
              <span class="dropdown-arrow">▼</span>
          </a>
      </div>
    </nav>

    <div id="dashboard" class="box">
        <div class="admin-header-layout">
            <div class="header-left">
                <h1>Panou de Control C.R.U.D.</h1>
                <button id="btn-adauga-animal">+ Adaugă Animal Nou</button>
                <button id="btn-sterge-tot">Șterge Toate Animalele</button>
            </div>

        <div class="header-right">
            <label for="file-import" class="btn-alege-fisier">Alege fișier...</label>
            <input type="file" id="file-import" accept=".json, .xml">
            <span id="file-name-display">Niciun fișier selectat</span>
            
            <button id="btn-import-executa">Importă Date</button>
            <button id="btn-export-json">Exportă JSON</button>
            <button id="btn-export-xml">Exportă XML</button>
        </div>
    </div>
        <div id="zona-formular">
            <h2>Adaugă un animal nou</h2>
            <form id="form-animal">
                
                <div class="form-grid">
                  <input type="text" id="add-nume-pop" placeholder="Denumire populară (ex: Leu)" required>
                  <input type="text" id="add-nume-st" placeholder="Denumire științifică (ex: Panthera leo)" required>
                  
                  <select id="add-clasa" required><option value="">-- Alege Clasa --</option></select>
                  <select id="add-origine" required><option value="">-- Alege Originea --</option></select>
                  <select id="add-regim" required><option value="">-- Alege Regimul --</option></select>
                  <select id="add-statut" required><option value="">-- Alege Statutul --</option></select>
                  <select id="add-clima" required><option value="">-- Alege Clima --</option></select>
                  <select id="add-inmultire" required><option value="">-- Alege Inmulțirea --</option></select>
                </div>

                <textarea id="add-desc-ro" placeholder="Descriere în Română"></textarea>
            
                <div class="form-checks">
                    <label>
                        <input type="checkbox" id="add-blana"> Are blană
                    </label>
                    <label>
                        <input type="checkbox" id="add-dresabil"> Poate fi dresat
                    </label>
                    <label>
                        <input type="checkbox" id="add-periculos"> Este periculos
                    </label>
                </div>

                <input type="text" id="add-imagine" class="input-imagine" placeholder="Nume fișier imagine (ex: leu.png)">

                <div class="form-actions">
                    <button type="submit" id="btn-salveaza">Salvează în Oracle</button>
                    <button type="button" id="btn-anuleaza">Anulează</button>
                </div>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nume Popular</th>
                    <th>Clasă</th>
                    <th>Acțiuni</th>
                </tr>
            </thead>
            <tbody id="tabel-animale">
            </tbody>
        </table>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/import_export.js"></script>
</body>
</html>
